<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Coach AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Google Sans', 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }
    #header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      font-size: 14px;
      font-weight: 600;
    }
    #header .badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      background: #ea4335;
      color: #fff;
      border-radius: 4px;
      padding: 2px 7px;
    }
    #main {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .rep-card {
      background: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      border: 1px solid #e5e5e5;
    }
    .rep-name  { font-weight: 600; font-size: 14px; }
    .rep-email { font-size: 12px; color: #666; margin-top: 2px; }
    label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      background: #fafafa;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:disabled { opacity: 0.55; cursor: default; }
    #btn-gen  { background: #0f6cbd; color: #fff; }
    #btn-copy { background: #107c10; color: #fff; display: none; margin-top: 4px; }
    #draft-section { display: none; }
    #error-box { color: #c00; background: #fff0f0; border: 1px solid #fcc; border-radius: 6px; padding: 12px; font-size: 13px; display: none; }
    #status-bar { font-size: 11px; color: #555; background: #e8f0fe; border: 1px solid #c5d5f5; border-radius: 6px; padding: 8px 12px; display: none; }
  </style>
</head>
<body>

<div id="header">
  &#9889; Sales Coach AI
  <span class="badge">GMAIL</span>
</div>

<div id="main">
  <div class="rep-card">
    <div class="rep-name" id="rep-name">Anushka Vikram</div>
    <div class="rep-email" id="rep-email">anushka.vikram@atidan.com</div>
  </div>

  <div>
    <label>Email from rep (editable)</label>
    <textarea id="email-body" rows="5">Right now the LI is working best for me. I&#39;ve done 40 calls today but all of them either went to VM or not picked up. You want any other approach which can work better?</textarea>
  </div>

  <button id="btn-gen">&#10024; Generate Coaching Reply</button>

  <div id="status-bar"></div>
  <div id="error-box"></div>

  <div id="draft-section">
    <label>Suggested reply</label>
    <textarea id="draft-out" rows="10" style="background:#fff"></textarea>
    <button id="btn-copy">&#128203; Copy to Clipboard</button>
  </div>
</div>

<script src="sidepanel.js"></script>

</body>
</html>
